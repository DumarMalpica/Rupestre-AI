name: Deploy — Producción

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build y Deploy al servidor UPTC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen Docker API
        run: docker build -f docker/api.Dockerfile -t rupestre-api:latest .

      - name: Build imagen Docker Agents
        run: docker build -f docker/agents.Dockerfile -t rupestre-agents:latest .

      # Agregar aquí el paso de deploy al servidor
      # (SSH, Kubernetes, Render, etc. según infraestructura UPTC)
      - name: Deploy
        run: echo "Configurar deploy según infraestructura disponible"
