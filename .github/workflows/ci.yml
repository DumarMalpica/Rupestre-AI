name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff black mypy

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Mypy
        run: mypy core/ agents/ api/ --ignore-missing-imports --explicit-package-bases

  test-agents:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run agent tests
        run: pytest agents/ -v --cov=agents --cov-fail-under=60

  test-core:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run core tests
        run: pytest tests/ -k "not integration" -v
